<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Translator</title>
<style>
  /* gruvbox dark hard */
  :root {
    --bg0: #1d2021;
    --bg1: #282828;
    --bg2: #3c3836;
    --fg:  #ebdbb2;
    --fg-dim: #a89984;
    --gray: #928374;
    --yellow: #fabd2f;
    --green: #b8bb26;
    --aqua: #8ec07c;
    --blue: #83a598;
    --orange: #fe8019;
    --red: #fb4934;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "JetBrains Mono", "SF Mono", Menlo, Monaco, monospace;
    font-size: 13px;
    background: var(--bg0);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 8px 10px;
    border: 2px solid var(--bg2);
  }
  ::selection { background: var(--bg2); }

  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    justify-content: space-between;
    color: var(--gray);
    padding-bottom: 6px;
    user-select: none;
  }
  .titlebar .title { color: var(--yellow); }
  .titlebar button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    font: inherit;
    color: var(--gray);
    cursor: pointer;
  }
  .titlebar button:hover { color: var(--red); }

  .rule { color: var(--bg2); white-space: nowrap; overflow: hidden; user-select: none; }

  .langs {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
  }
  .langs label { color: var(--gray); user-select: none; }
  select {
    flex: 1;
    background: var(--bg0);
    color: var(--aqua);
    border: none;
    outline: none;
    font: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  #swap {
    background: none;
    border: none;
    font: inherit;
    color: var(--orange);
    cursor: pointer;
  }
  #swap:hover { color: var(--yellow); }

  .pane-label {
    color: var(--gray);
    user-select: none;
    padding: 4px 0 2px;
    display: flex;
    justify-content: space-between;
  }
  .pane-label .accent { color: var(--green); }
  .speak {
    background: none;
    border: none;
    font: inherit;
    color: var(--gray);
    cursor: pointer;
    padding: 0 2px;
  }
  .speak:hover { color: var(--yellow); }
  .speak.playing { color: var(--orange); }

  textarea, #output {
    width: 100%;
    background: var(--bg0);
    color: var(--fg);
    border: 1px solid var(--bg2);
    padding: 6px 8px;
    font: inherit;
    resize: none;
    outline: none;
  }
  textarea { height: 76px; caret-color: var(--fg); }
  textarea:focus { border-color: var(--yellow); }
  textarea::placeholder { color: var(--gray); }
  #output {
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--green);
  }
  #output:empty::before { content: "~"; color: var(--bg2); }

  .statusbar {
    display: flex;
    justify-content: space-between;
    padding-top: 6px;
    color: var(--gray);
    user-select: none;
  }
  #status { color: var(--blue); }
  #status.error { color: var(--red); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--bg2); }
</style>
</head>
<body>
  <div class="titlebar">
    <span><span class="title">translator</span> <span>— ⌘⇧T</span></span>
    <button id="quit" title="Quit">[x]</button>
  </div>
  <div class="rule">────────────────────────────────────────────────────────────</div>
  <div class="langs">
    <label>from:</label>
    <select id="from"><option value="auto" selected>auto</option></select>
    <button id="swap" title="Swap">&lt;-&gt;</button>
    <label>to:</label>
    <select id="to"></select>
  </div>
  <div class="pane-label"><span>┌─ <span class="accent">input</span></span><button class="speak" id="speak-in" title="Speak input">[▶]</button></div>
  <textarea id="input" placeholder="type to translate…" spellcheck="false"></textarea>
  <div class="pane-label"><span>┌─ <span class="accent">output</span></span><button class="speak" id="speak-out" title="Speak translation">[▶]</button></div>
  <div id="output"></div>
  <div class="statusbar">
    <span id="status"></span>
    <span>esc:hide</span>
  </div>

<script>
  const LANGS = {
    en: 'english', es: 'spanish', fr: 'french', de: 'german', it: 'italian',
    pt: 'portuguese', nl: 'dutch', ru: 'russian', uk: 'ukrainian', pl: 'polish',
    ja: 'japanese', ko: 'korean', 'zh-CN': 'chinese (simplified)',
    'zh-TW': 'chinese (traditional)', ar: 'arabic', hi: 'hindi', tr: 'turkish',
    vi: 'vietnamese', th: 'thai', id: 'indonesian', sv: 'swedish', el: 'greek'
  };
  const fromSel = document.getElementById('from');
  const toSel = document.getElementById('to');
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const status = document.getElementById('status');

  for (const [code, name] of Object.entries(LANGS)) {
    fromSel.add(new Option(name, code));
    toSel.add(new Option(name, code));
  }
  fromSel.value = localStorage.getItem('from') || 'auto';
  toSel.value = localStorage.getItem('to') || 'en';

  let timer = null;
  let seq = 0;
  let lastDetected = null;
  async function translate() {
    const text = input.value.trim();
    if (!text) { output.textContent = ''; setStatus(''); return; }
    const id = ++seq;
    setStatus('translating…');
    try {
      const { translated, detected } = await window.api.translate({
        text, from: fromSel.value, to: toSel.value
      });
      if (id !== seq) return; // stale response
      lastDetected = detected;
      output.textContent = translated;
      setStatus(fromSel.value === 'auto' && detected
        ? 'detected: ' + (LANGS[detected] || detected) : '');
    } catch (err) {
      if (id !== seq) return;
      setStatus('error: ' + err.message, true);
    }
  }
  function setStatus(msg, isError) {
    status.textContent = msg;
    status.classList.toggle('error', !!isError);
  }
  function schedule() {
    clearTimeout(timer);
    timer = setTimeout(translate, 350);
  }

  input.addEventListener('input', schedule);
  fromSel.addEventListener('change', () => { localStorage.setItem('from', fromSel.value); translate(); });
  toSel.addEventListener('change', () => { localStorage.setItem('to', toSel.value); translate(); });

  document.getElementById('swap').addEventListener('click', () => {
    if (fromSel.value === 'auto') return;
    [fromSel.value, toSel.value] = [toSel.value, fromSel.value];
    localStorage.setItem('from', fromSel.value);
    localStorage.setItem('to', toSel.value);
    if (output.textContent) input.value = output.textContent;
    translate();
  });

  // --- text-to-speech (macOS system voices via Web Speech API) ---
  function speak(text, lang, btn) {
    if (!text) return;
    if (speechSynthesis.speaking) { speechSynthesis.cancel(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    const voice = speechSynthesis.getVoices()
      .find((v) => v.lang.replace('_', '-').toLowerCase().startsWith(lang.toLowerCase()));
    if (voice) u.voice = voice;
    u.onstart = () => btn.classList.add('playing');
    u.onend = u.onerror = () => btn.classList.remove('playing');
    speechSynthesis.speak(u);
  }
  const speakIn = document.getElementById('speak-in');
  const speakOut = document.getElementById('speak-out');
  speakIn.addEventListener('click', () => {
    const lang = fromSel.value === 'auto' ? (lastDetected || 'en') : fromSel.value;
    speak(input.value.trim(), lang, speakIn);
  });
  speakOut.addEventListener('click', () => speak(output.textContent, toSel.value, speakOut));
  speechSynthesis.getVoices(); // warm up the voice list

  document.getElementById('quit').addEventListener('click', () => window.api.quit());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.api.hide();
  });
  window.api.onFocusInput(() => { input.focus(); input.select(); });
</script>
</body>
</html>
